version: '3.8'

services:
  mcp-server:
    build: .
    container_name: mysql-mcp-streamable-http
    ports:
      - "9000:8000"
    environment:
      - DB_SERVER=${DB_SERVER:-host.docker.internal}
      - DB_PORT=${DB_PORT:-3306}
      - DB_NAME=${DB_NAME:-testdb}
      - DB_USER=${DB_USER:-root}
      - DB_PASSWORD=${DB_PASSWORD:-Passw0rd123456}
      - HOST=0.0.0.0
      - PORT=8000
      - ENVIRONMENT=production
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}
    env_file:
      - .env
    # host.docker.internal works out-of-the-box on Docker Desktop (Mac/Windows).
    # On Linux, the extra_hosts entry below maps it to the host gateway.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - mcp-network
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  mcp-network:
    driver: bridge
